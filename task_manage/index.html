<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My ToDo App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; }
        
        /* 入力エリアの調整 */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 6px; outline: none; }
        input[type="text"]:focus { border-color: #007bff; }
        input[type="date"] { padding: 10px; border: 2px solid #ddd; border-radius: 6px; font-family: inherit; }

        button.add-btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button.add-btn:hover { background: #0056b3; }
        
        ul { list-style: none; padding: 0; }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        
        /* タスクテキストと期限の並び */
        .task-content { flex: 1; display: flex; flex-direction: column; cursor: pointer; }
        .task-text { font-weight: 500; }
        .task-deadline { font-size: 0.8em; color: #888; margin-top: 2px; }
        .completed .task-text, .completed .task-deadline { text-decoration: line-through; color: #bbb; }
        .actions { display: flex; gap: 5px; margin-left: 10px; }
        .btn-sm { border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .done-btn { background: #28a745; color: white; }
        .delete-btn { background: #dc3545; color: white; }
        .overdue {
            color: #ff4d4d !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 My Tasks</h2>
    
    <div class="input-group">
        <div class="input-row">
            <input type="text" id="taskInput" placeholder="何をする？">
            <input type="date" id="dateInput">
        </div>
        <button class="add-btn" onclick="addTask()">タスクを追加</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
    // --- 1. データ管理 ---
    let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];

    // --- 2. 描画処理 ---
    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';

        tasks.sort((a, b) => {
            // 完了状態が異なる場合、未完了を上にする
            if (a.isCompleted !== b.isCompleted) {
                return a.isCompleted ? 1 : -1;
            }
            // 完了状態が同じなら、期限で比較する（先ほどのロジック）
            if (a.deadline && b.deadline) return a.deadline.localeCompare(b.deadline);
            if (a.deadline && !b.deadline) return -1;
            if (!a.deadline && b.deadline) return 1;
            return 0;
        });

        const now = new Date();
        const today = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.isCompleted ? 'completed' : ''}`;
            // ② 期限切れ判定のロジック
            // 「期限が設定されている」かつ「期限が今日より前」かつ「未完了」の場合
            const isOverdue = task.deadline && task.deadline < today && !task.isCompleted;
        
            // ③ 期限切れなら 'overdue' クラスを付与する
            const deadlineClass = isOverdue ? 'task-deadline overdue' : 'task-deadline';
            const deadlineDisplay = task.deadline ? `📅 期限: ${task.deadline}` : '期限なし';

            li.innerHTML = `
                <div class="task-content" onclick="toggleTask(${task.id})">
                    <span class="task-text">${task.title}</span>
                    <span class="${deadlineClass}">${deadlineDisplay} ${isOverdue ? '⚠️ 期限切れ' : ''}</span>
                </div>
                </div>
                <div class="actions">
                    <button class="btn-sm done-btn" onclick="toggleTask(${task.id})">
                        ${task.isCompleted ? '戻す' : '完了'}
                    </button>
                    <button class="btn-sm delete-btn" onclick="deleteTask(${task.id})">削除</button>
                </div>
            `;
            list.appendChild(li);
        });

        localStorage.setItem('myTasks', JSON.stringify(tasks));
    }

    // --- 3. 追加機能 ---
    function addTask() {
        const input = document.getElementById('taskInput');
        const dateInput = document.getElementById('dateInput');
        
        if (!input.value.trim()) return;

        const newTask = {
            id: Date.now(),
            title: input.value,
            deadline: dateInput.value, // 入力された日付（YYYY-MM-DD）
            isCompleted: false
        };

        tasks.push(newTask);
        input.value = '';
        dateInput.value = ''; // 日付もリセット
        renderTasks();
    }

    // Enterキー対応
    document.getElementById('taskInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    // --- 4. 更新機能 ---
    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? { ...t, isCompleted: !t.isCompleted } : t);
        renderTasks();
    }

    // --- 5. 削除機能 ---
    function deleteTask(id) {
        if (confirm('このタスクを削除しますか？')) {
            tasks = tasks.filter(t => t.id !== id);
            renderTasks();
        }
    }

    renderTasks();
</script>

</body>
</html>
